<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050508">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Void Mediator">
  <title>Void Mediator — Phase-Law Architecture</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/json,{
    &quot;name&quot;: &quot;Void Mediator&quot;,
    &quot;short_name&quot;: &quot;VoidMed&quot;,
    &quot;description&quot;: &quot;Bridging information and physics&quot;,
    &quot;start_url&quot;: &quot;.&quot;,
    &quot;display&quot;: &quot;standalone&quot;,
    &quot;background_color&quot;: &quot;#050508&quot;,
    &quot;theme_color&quot;: &quot;#050508&quot;
  }">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      background: #050508;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
      -webkit-font-smoothing: antialiased;
    }
    /* Hide scrollbar but allow scrolling */
    ::-webkit-scrollbar { width: 0; height: 0; }
    canvas { touch-action: none; }
  </style>

  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ═══════════════════════════════════════════════════════════
       Void Mediator v0.2
       Bridging the Discontinuity Between Information and Physics
       Phase Gear Engine — Phase-Law Architecture / pTCP

       v0.2 evolution:
       - Persistent render loop + ref-driven engine (no interval churn)
       - devicePixelRatio-aware canvas, spatial-grid particle links
       - Touch perturbation: observation disturbs the field
       - Phase-transition log with haptic pulse + localStorage persistence
       - FIELD LOG: CSV recorder compatible with field-analysis.html
       - μ×ρ phase portrait
       - Optional audio drone following μ (off by default)
       - SIM mode: pointer-driven field when device sensors are absent
       ═══════════════════════════════════════════════════════════ */

    // ── Constants ──
    const TAU = Math.PI * 2;
    const VOID_BLACK = "#050508";
    const FIELD_GREEN = "#1a3a2a";
    const GLOW_CYAN = "#4af0d0";
    const GLOW_DIM = "#1a6a5a";
    const PULSE_GOLD = "#d4a843";
    const WARN_RED = "#c44a3a";

    const TICK_MS = 80;
    const LS_TRANSITIONS = "vm.transitions.v2";
    const LS_LAST_MU = "vm.lastMu.v2";

    // ── Utility ──
    const lerp = (a, b, t) => a + (b - a) * Math.max(0, Math.min(1, t));
    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
    const pad2 = (n) => String(n).padStart(2, "0");
    const hms = (ts) => {
      const d = new Date(ts);
      return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
    };

    function phaseName(mu) {
      if (mu < 0.15) return "VOID";
      if (mu < 0.35) return "LATENT";
      if (mu < 0.55) return "MEDIATING";
      if (mu < 0.75) return "COHERENT";
      return "DISSOLVED";
    }

    const PHASE_DESC = {
      VOID: "Pure physical state — no connection to information",
      LATENT: "Latent mediation — field emergence",
      MEDIATING: "Mediation in progress — bidirectional constraint propagation",
      COHERENT: "Field order established — guidance without command",
      DISSOLVED: "Full mediation — info/physics distinction dissolved",
    };

    function loadTransitions() {
      try {
        const raw = localStorage.getItem(LS_TRANSITIONS);
        const arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr.slice(-100) : [];
      } catch (e) { return []; }
    }

    function loadLastMu() {
      const v = parseFloat(localStorage.getItem(LS_LAST_MU));
      return Number.isFinite(v) ? clamp(v, 0.02, 0.98) : 0.15;
    }

    // ── Sound Engine (drone following μ) ──
    function createDrone() {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      const ctx = new Ctx();
      const o1 = ctx.createOscillator();
      const o2 = ctx.createOscillator();
      const filter = ctx.createBiquadFilter();
      const gain = ctx.createGain();
      o1.type = "sine";
      o2.type = "sine";
      filter.type = "lowpass";
      filter.frequency.value = 300;
      gain.gain.value = 0;
      o1.connect(filter);
      o2.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      o1.start();
      o2.start();
      return { ctx, o1, o2, filter, gain };
    }

    /* ═══════════════════════════════════════
       Void Engine — sensors + phase gear in one
       ref-driven core; React state published at low rate
       ═══════════════════════════════════════ */
    function useVoidEngine(started) {
      const sensorsRef = useRef({
        accel: { x: 0, y: 0, z: 9.8 },
        gyro: { alpha: 0, beta: 0, gamma: 0 },
        light: 50,
        audioLevel: 0,
        geo: null,
      });
      const availableRef = useRef({ motion: false, orientation: false, audio: false, geo: false, light: false, sim: false });
      const phaseRef = useRef({
        mu: loadLastMu(),
        fieldDensity: 0,
        motionEnergy: 0,
        environmentalComplexity: 0,
        constraintTension: 0,
        phaseGearRatio: 1,
        fieldVector: { dx: 0, dy: 0, magnitude: 0 },
      });
      const touchRef = useRef({ active: false, dx: 0, dy: 0, energy: 0 });
      const historyRef = useRef([]);
      const transitionsRef = useRef(loadTransitions());
      const recRef = useRef({ on: false, rows: [], t0: 0 });
      const droneRef = useRef(null);
      const soundOnRef = useRef(false);
      const audioNodesRef = useRef({ analyser: null, data: new Uint8Array(64), ctx: null });

      const [ui, setUi] = useState(() => ({
        sensors: { ...sensorsRef.current },
        available: { ...availableRef.current },
        phase: { ...phaseRef.current },
        history: [],
        transitions: transitionsRef.current,
        rec: { on: false, rows: 0, elapsed: 0 },
        soundOn: false,
      }));

      // Mic — must be called after a user gesture
      const enableMic = useCallback(async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const Ctx = window.AudioContext || window.webkitAudioContext;
          const ctx = new Ctx();
          const src = ctx.createMediaStreamSource(stream);
          const analyser = ctx.createAnalyser();
          analyser.fftSize = 128;
          src.connect(analyser);
          audioNodesRef.current.analyser = analyser;
          audioNodesRef.current.ctx = ctx;
          availableRef.current.audio = true;
        } catch (e) { /* mic not available */ }
      }, []);

      const toggleSound = useCallback(() => {
        if (!droneRef.current) droneRef.current = createDrone();
        const d = droneRef.current;
        if (!d) return;
        const next = !soundOnRef.current;
        soundOnRef.current = next;
        if (next && d.ctx.state === "suspended") d.ctx.resume();
        if (!next) d.gain.gain.setTargetAtTime(0, d.ctx.currentTime, 0.2);
        setUi((u) => ({ ...u, soundOn: next }));
      }, []);

      const startRec = useCallback(() => {
        recRef.current = { on: true, rows: [], t0: Date.now() };
      }, []);
      const stopRec = useCallback(() => {
        recRef.current.on = false;
      }, []);
      const clearRec = useCallback(() => {
        recRef.current = { on: false, rows: [], t0: 0 };
      }, []);
      const downloadRec = useCallback(() => {
        const rows = recRef.current.rows;
        if (!rows.length) return;
        const header = "time,elapsed_ms,mu,field_density,motion_energy,env_complexity,constraint_tension,phase_gear_ratio,field_phase,accel_x,accel_y,accel_z,gyro_alpha,gyro_beta,gyro_gamma,audio_level,light_lux,wifi_ap_count,wifi_density,wifi_stale,wifi_stale_ms";
        const csv = header + "\n" + rows.join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const d = new Date();
        a.href = url;
        a.download = `void-field-log-${d.getFullYear()}${pad2(d.getMonth() + 1)}${pad2(d.getDate())}-${pad2(d.getHours())}${pad2(d.getMinutes())}.csv`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }, []);

      const clearTransitions = useCallback(() => {
        transitionsRef.current = [];
        try { localStorage.setItem(LS_TRANSITIONS, "[]"); } catch (e) {}
        setUi((u) => ({ ...u, transitions: [] }));
      }, []);

      useEffect(() => {
        if (!started) return;
        let mounted = true;
        const S = sensorsRef.current;
        const AV = availableRef.current;

        // ── Raw sensor listeners: write to refs, no re-render ──
        const handleMotion = (e) => {
          const a = e.accelerationIncludingGravity || {};
          S.accel = { x: a.x || 0, y: a.y || 0, z: a.z || 9.8 };
          AV.motion = true;
          AV.sim = false;
        };
        const handleOrientation = (e) => {
          S.gyro = { alpha: e.alpha || 0, beta: e.beta || 0, gamma: e.gamma || 0 };
          AV.orientation = true;
        };
        window.addEventListener("devicemotion", handleMotion);
        window.addEventListener("deviceorientation", handleOrientation);

        // ── Ambient light: real sensor when available, else slow drift ──
        let lightSensor = null;
        let lightInterval = null;
        if ("AmbientLightSensor" in window) {
          try {
            lightSensor = new AmbientLightSensor({ frequency: 2 });
            lightSensor.addEventListener("reading", () => {
              // map lux (0..~10000) to 0..100 on a log scale
              S.light = clamp((Math.log10(lightSensor.illuminance + 1) / 4) * 100, 0, 100);
              AV.light = true;
            });
            lightSensor.start();
          } catch (e) { lightSensor = null; }
        }
        if (!lightSensor) {
          lightInterval = setInterval(() => {
            S.light = 30 + Math.sin(Date.now() / 8000) * 20 + Math.random() * 5;
          }, 500);
        }

        // ── Geolocation ──
        let geoWatch = null;
        if ("geolocation" in navigator) {
          geoWatch = navigator.geolocation.watchPosition(
            (pos) => {
              S.geo = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy };
              AV.geo = true;
            },
            () => {},
            { enableHighAccuracy: false }
          );
        }

        // ── SIM mode: no motion sensor → pointer drives the field ──
        const simState = { px: 0.5, py: 0.5, lastX: 0.5, lastY: 0.5, speed: 0 };
        const simTimer = setTimeout(() => {
          if (!AV.motion) AV.sim = true;
        }, 2500);
        const handlePointer = (e) => {
          const nx = e.clientX / window.innerWidth;
          const ny = e.clientY / window.innerHeight;
          simState.speed = clamp(Math.hypot(nx - simState.lastX, ny - simState.lastY) * 30, 0, 1);
          simState.lastX = nx; simState.lastY = ny;
          simState.px = nx; simState.py = ny;
        };
        window.addEventListener("pointermove", handlePointer);

        // ── Phase Gear tick ──
        const prev = { accel: { ...S.accel }, mu: phaseRef.current.mu, fieldDensity: 0, phase: phaseName(phaseRef.current.mu), pendingPhase: null, pendingCount: 0 };
        let tickCount = 0;

        const tick = setInterval(() => {
          if (!mounted) return;
          tickCount++;

          // mic level
          const an = audioNodesRef.current;
          if (an.analyser) {
            an.analyser.getByteFrequencyData(an.data);
            S.audioLevel = an.data.reduce((s, v) => s + v, 0) / an.data.length / 255;
          }

          // SIM synthesis: breathing accel + pointer-driven tilt
          if (AV.sim) {
            const t = Date.now();
            S.accel = {
              x: Math.sin(t / 1300) * 0.12 + (Math.random() - 0.5) * 0.06 + simState.speed * (Math.random() - 0.5) * 3,
              y: Math.cos(t / 1700) * 0.12 + (Math.random() - 0.5) * 0.06 + simState.speed * (Math.random() - 0.5) * 3,
              z: 9.8 + Math.sin(t / 900) * 0.15,
            };
            S.gyro = {
              alpha: 0,
              beta: (simState.py - 0.5) * 60,
              gamma: (simState.px - 0.5) * 60,
            };
            simState.speed *= 0.9;
          }

          const { accel, gyro, audioLevel, light } = S;
          const touch = touchRef.current;
          touch.energy *= 0.94;

          const jerk = Math.sqrt(
            (accel.x - prev.accel.x) ** 2 +
            (accel.y - prev.accel.y) ** 2 +
            (accel.z - prev.accel.z) ** 2
          );
          const motionEnergy = clamp(jerk / 5 + touch.energy * 0.5, 0, 1);
          const envComplexity = clamp(audioLevel * 0.6 + (Math.abs(light - 50) / 50) * 0.4, 0, 1);
          const fieldDensity = clamp(motionEnergy * 0.4 + envComplexity * 0.6, 0, 1);
          const orientationMag = Math.sqrt(gyro.beta ** 2 + gyro.gamma ** 2) / 180;
          const constraintTension = clamp(Math.abs(fieldDensity - orientationMag), 0, 1);
          const phaseGearRatio = 1 + constraintTension * 4;

          const alpha = 0.08;
          const beta = 0.04;
          const mu_env = clamp(0.1 + fieldDensity * 0.6 + envComplexity * 0.3 + touch.energy * 0.25, 0, 1);
          const gradRho = (fieldDensity - prev.fieldDensity) * 10;
          const dMu = alpha * (mu_env - prev.mu) + beta * gradRho;
          const mu = clamp(prev.mu + dMu, 0.02, 0.98);

          const dx = clamp(gyro.gamma / 90 + (touch.active ? touch.dx * 0.6 : 0), -1, 1);
          const dy = clamp(gyro.beta / 90 + (touch.active ? touch.dy * 0.6 : 0), -1, 1);
          const mag = Math.sqrt(dx * dx + dy * dy);

          phaseRef.current = {
            mu,
            fieldDensity,
            motionEnergy,
            environmentalComplexity: envComplexity,
            constraintTension,
            phaseGearRatio,
            fieldVector: { dx, dy, magnitude: clamp(mag, 0, 1) },
          };

          historyRef.current.push({ mu, fieldDensity, t: Date.now() });
          if (historyRef.current.length > 180) historyRef.current.shift();

          // ── Phase transition detection (3-tick hysteresis) ──
          const nowPhase = phaseName(mu);
          if (nowPhase !== prev.phase) {
            if (prev.pendingPhase === nowPhase) {
              prev.pendingCount++;
              if (prev.pendingCount >= 3) {
                const tr = { t: Date.now(), from: prev.phase, to: nowPhase, mu: +mu.toFixed(3) };
                transitionsRef.current = [...transitionsRef.current.slice(-99), tr];
                try { localStorage.setItem(LS_TRANSITIONS, JSON.stringify(transitionsRef.current)); } catch (e) {}
                if (navigator.vibrate) navigator.vibrate(nowPhase === "DISSOLVED" ? [15, 40, 15] : 12);
                prev.phase = nowPhase;
                prev.pendingPhase = null;
                prev.pendingCount = 0;
              }
            } else {
              prev.pendingPhase = nowPhase;
              prev.pendingCount = 1;
            }
          } else {
            prev.pendingPhase = null;
            prev.pendingCount = 0;
          }

          // ── CSV recorder ──
          const rec = recRef.current;
          if (rec.on) {
            const now = Date.now();
            rec.rows.push([
              new Date(now).toISOString(),
              now - rec.t0,
              mu.toFixed(4), fieldDensity.toFixed(4), motionEnergy.toFixed(4),
              envComplexity.toFixed(4), constraintTension.toFixed(4), phaseGearRatio.toFixed(3),
              nowPhase,
              accel.x.toFixed(3), accel.y.toFixed(3), accel.z.toFixed(3),
              gyro.alpha.toFixed(2), gyro.beta.toFixed(2), gyro.gamma.toFixed(2),
              audioLevel.toFixed(4), light.toFixed(1),
              0, 0, 0, 0,
            ].join(","));
          }

          // ── Drone follows μ ──
          if (soundOnRef.current && droneRef.current) {
            const d = droneRef.current;
            const t0 = d.ctx.currentTime;
            const freq = 82.4 * Math.pow(2, mu * 1.6);
            d.o1.frequency.setTargetAtTime(freq, t0, 0.15);
            d.o2.frequency.setTargetAtTime(freq * 1.007, t0, 0.15);
            d.filter.frequency.setTargetAtTime(180 + mu * 1400, t0, 0.2);
            d.gain.gain.setTargetAtTime(0.015 + fieldDensity * 0.05, t0, 0.25);
          }

          // persist μ occasionally
          if (tickCount % 60 === 0) {
            try { localStorage.setItem(LS_LAST_MU, mu.toFixed(4)); } catch (e) {}
          }

          prev.accel = { ...accel };
          prev.mu = mu;
          prev.fieldDensity = fieldDensity;
        }, TICK_MS);

        // ── UI publish at ~8Hz ──
        const publish = setInterval(() => {
          if (!mounted) return;
          const rec = recRef.current;
          setUi({
            sensors: { accel: { ...S.accel }, gyro: { ...S.gyro }, light: S.light, audioLevel: S.audioLevel, geo: S.geo },
            available: { ...AV },
            phase: { ...phaseRef.current },
            history: historyRef.current.slice(),
            transitions: transitionsRef.current,
            rec: { on: rec.on, rows: rec.rows.length, elapsed: rec.on ? Date.now() - rec.t0 : 0 },
            soundOn: soundOnRef.current,
          });
        }, 120);

        return () => {
          mounted = false;
          clearInterval(tick);
          clearInterval(publish);
          clearTimeout(simTimer);
          if (lightInterval) clearInterval(lightInterval);
          if (lightSensor) try { lightSensor.stop(); } catch (e) {}
          window.removeEventListener("devicemotion", handleMotion);
          window.removeEventListener("deviceorientation", handleOrientation);
          window.removeEventListener("pointermove", handlePointer);
          if (geoWatch) navigator.geolocation.clearWatch(geoWatch);
          if (audioNodesRef.current.ctx) audioNodesRef.current.ctx.close();
          if (droneRef.current) droneRef.current.ctx.close();
        };
      }, [started]);

      return {
        ui, phaseRef, touchRef, enableMic, toggleSound,
        rec: { start: startRec, stop: stopRec, clear: clearRec, download: downloadRec },
        clearTransitions,
      };
    }

    /* ═══════════════════════════════════════
       Particle Field Canvas — mounts once,
       persistent RAF loop reads phaseRef/touchRef
       ═══════════════════════════════════════ */
    function FieldCanvas({ phaseRef, touchRef }) {
      const canvasRef = useRef(null);
      const wrapRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const wrap = wrapRef.current;
        if (!canvas || !wrap) return;
        const ctx = canvas.getContext("2d");
        const dpr = window.devicePixelRatio || 1;

        let W = 0, H = 0;
        const resize = () => {
          const size = clamp(wrap.clientWidth, 200, 380);
          W = Math.round(size * dpr);
          H = W;
          canvas.width = W;
          canvas.height = H;
          canvas.style.width = size + "px";
          canvas.style.height = size + "px";
        };
        resize();
        window.addEventListener("resize", resize);

        // particles in device-pixel space
        const particles = [];
        for (let i = 0; i < 170; i++) {
          particles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            vx: (Math.random() - 0.5) * 0.5 * dpr,
            vy: (Math.random() - 0.5) * 0.5 * dpr,
            size: (1 + Math.random() * 2) * dpr,
            phase: Math.random() * TAU,
            life: 0.3 + Math.random() * 0.7,
          });
        }

        // touch state local to canvas (device px)
        const pt = { active: false, x: 0, y: 0 };
        const toCanvas = (e) => {
          const r = canvas.getBoundingClientRect();
          return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
        };
        const writeTouch = (x, y, bump) => {
          const t = touchRef.current;
          t.active = pt.active;
          t.dx = clamp((x - W / 2) / (W / 2), -1, 1);
          t.dy = clamp((y - H / 2) / (H / 2), -1, 1);
          if (bump) t.energy = clamp(t.energy + 0.18, 0, 1);
        };
        const onDown = (e) => {
          pt.active = true;
          const c = toCanvas(e);
          pt.x = c.x; pt.y = c.y;
          writeTouch(c.x, c.y, true);
          canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
        };
        const onMove = (e) => {
          if (!pt.active) return;
          const c = toCanvas(e);
          pt.x = c.x; pt.y = c.y;
          writeTouch(c.x, c.y, true);
        };
        const onUp = () => {
          pt.active = false;
          touchRef.current.active = false;
        };
        canvas.addEventListener("pointerdown", onDown);
        canvas.addEventListener("pointermove", onMove);
        canvas.addEventListener("pointerup", onUp);
        canvas.addEventListener("pointercancel", onUp);

        let frame = 0;
        let raf;
        const cell = 44 * dpr;

        const draw = () => {
          const p = phaseRef.current;
          const { mu, fieldDensity, fieldVector, motionEnergy, constraintTension } = p;
          frame++;
          const t = frame * 0.02;

          ctx.fillStyle = VOID_BLACK;
          ctx.fillRect(0, 0, W, H);

          const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.6);
          grad.addColorStop(0, `rgba(26,58,42,${mu * 0.15})`);
          grad.addColorStop(0.5, `rgba(10,30,20,${mu * 0.08})`);
          grad.addColorStop(1, "transparent");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, W, H);

          // constraint rings
          const ringCount = 3 + Math.floor(constraintTension * 5);
          for (let i = 0; i < ringCount; i++) {
            const phase = t * (0.3 + i * 0.1) + (i * TAU) / ringCount;
            const radius = (30 + i * 40 + Math.sin(phase) * 15) * dpr;
            const cx = W / 2 + fieldVector.dx * 60 * dpr;
            const cy = H / 2 + fieldVector.dy * 60 * dpr;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, TAU);
            ctx.strokeStyle = `rgba(74,240,208,${(0.03 + mu * 0.08) * (1 - i / ringCount)})`;
            ctx.lineWidth = (0.5 + mu * 1.5) * dpr;
            ctx.stroke();
          }

          // particle update
          const touchR = 90 * dpr;
          for (const q of particles) {
            const fdx = fieldVector.dx * mu * 0.3 * dpr;
            const fdy = fieldVector.dy * mu * 0.3 * dpr;
            const nx = Math.sin(q.x * (0.01 / dpr) + t) * 0.2 * dpr;
            const ny = Math.cos(q.y * (0.01 / dpr) + t * 0.7) * 0.2 * dpr;

            q.vx = lerp(q.vx, fdx + nx, 0.05);
            q.vy = lerp(q.vy, fdy + ny, 0.05);

            // touch perturbation: observation disturbs the field
            if (pt.active) {
              const ddx = q.x - pt.x;
              const ddy = q.y - pt.y;
              const dist = Math.hypot(ddx, ddy);
              if (dist < touchR && dist > 1) {
                const force = (1 - dist / touchR) * 1.4 * dpr;
                q.vx += (ddx / dist) * force;
                q.vy += (ddy / dist) * force;
              }
            }

            q.x += q.vx + motionEnergy * (Math.random() - 0.5) * 2 * dpr;
            q.y += q.vy + motionEnergy * (Math.random() - 0.5) * 2 * dpr;
            q.vx *= 0.96;
            q.vy *= 0.96;

            if (q.x < 0) q.x += W;
            if (q.x > W) q.x -= W;
            if (q.y < 0) q.y += H;
            if (q.y > H) q.y -= H;

            q.phase += 0.02 + fieldDensity * 0.05;
          }

          // links via spatial grid — O(n) instead of O(n²)
          if (mu > 0.3) {
            const linkR = 40 * mu * dpr;
            const grid = new Map();
            particles.forEach((q, i) => {
              const key = `${Math.floor(q.x / cell)},${Math.floor(q.y / cell)}`;
              if (!grid.has(key)) grid.set(key, []);
              grid.get(key).push(i);
            });
            let links = 0;
            ctx.lineWidth = 0.3 * dpr;
            for (let i = 0; i < particles.length && links < 400; i++) {
              const q = particles[i];
              const gx = Math.floor(q.x / cell);
              const gy = Math.floor(q.y / cell);
              for (let ox = -1; ox <= 1; ox++) {
                for (let oy = -1; oy <= 1; oy++) {
                  const bucket = grid.get(`${gx + ox},${gy + oy}`);
                  if (!bucket) continue;
                  for (const j of bucket) {
                    if (j <= i) continue;
                    const r = particles[j];
                    const dist = Math.hypot(q.x - r.x, q.y - r.y);
                    if (dist < linkR && dist > 5 * dpr) {
                      ctx.beginPath();
                      ctx.moveTo(q.x, q.y);
                      ctx.lineTo(r.x, r.y);
                      ctx.strokeStyle = `rgba(74,240,208,${(1 - dist / linkR) * 0.08 * mu})`;
                      ctx.stroke();
                      links++;
                    }
                  }
                }
              }
            }
          }

          // particle draw
          for (const q of particles) {
            const pulse = 0.3 + Math.sin(q.phase) * 0.3;
            const a = q.life * pulse * (0.2 + mu * 0.6);
            ctx.beginPath();
            ctx.arc(q.x, q.y, q.size * (0.8 + mu * 0.5), 0, TAU);
            ctx.fillStyle = `rgba(74,240,208,${a})`;
            ctx.fill();
          }

          // touch ripple
          if (pt.active) {
            const rr = (20 + Math.sin(frame * 0.15) * 6) * dpr;
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, rr, 0, TAU);
            ctx.strokeStyle = `rgba(212,168,67,${0.25 + touchRef.current.energy * 0.3})`;
            ctx.lineWidth = 1 * dpr;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, rr * 1.8, 0, TAU);
            ctx.strokeStyle = `rgba(212,168,67,${0.1 * touchRef.current.energy})`;
            ctx.stroke();
          }

          // void core
          const voidRadius = (20 + mu * 30) * dpr;
          const voidGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, voidRadius);
          voidGrad.addColorStop(0, `rgba(5,5,8,${1 - mu * 0.5})`);
          voidGrad.addColorStop(0.6, `rgba(26,106,90,${mu * 0.15})`);
          voidGrad.addColorStop(1, "transparent");
          ctx.fillStyle = voidGrad;
          ctx.beginPath();
          ctx.arc(W / 2, H / 2, voidRadius, 0, TAU);
          ctx.fill();

          raf = requestAnimationFrame(draw);
        };

        draw();
        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener("resize", resize);
          canvas.removeEventListener("pointerdown", onDown);
          canvas.removeEventListener("pointermove", onMove);
          canvas.removeEventListener("pointerup", onUp);
          canvas.removeEventListener("pointercancel", onUp);
        };
      }, []);

      return (
        <div ref={wrapRef} style={{ width: "100%", maxWidth: 360, margin: "0 auto" }}>
          <canvas
            ref={canvasRef}
            style={{
              display: "block",
              borderRadius: 12,
              border: "1px solid rgba(74,240,208,0.15)",
              cursor: "crosshair",
            }}
          />
          <div style={{ textAlign: "center", fontSize: 8, color: "rgba(255,255,255,0.12)", marginTop: 4, letterSpacing: "0.1em" }}>
            TOUCH THE FIELD — OBSERVATION PERTURBS μ
          </div>
        </div>
      );
    }

    // ── μ Gauge ──
    function MuGauge({ mu, label }) {
      const percent = mu * 100;
      const color = mu < 0.3 ? GLOW_DIM : mu < 0.7 ? GLOW_CYAN : PULSE_GOLD;
      const circumference = TAU * 42;
      const dashOffset = circumference * (1 - mu);

      return (
        <div style={{ textAlign: "center", position: "relative" }}>
          <svg width="110" height="110" viewBox="0 0 110 110">
            <circle cx="55" cy="55" r="42" fill="none" stroke="rgba(74,240,208,0.08)" strokeWidth="4" />
            <circle
              cx="55" cy="55" r="42" fill="none"
              stroke={color}
              strokeWidth="4"
              strokeDasharray={circumference}
              strokeDashoffset={dashOffset}
              strokeLinecap="round"
              transform="rotate(-90 55 55)"
              style={{ transition: "stroke-dashoffset 0.3s ease, stroke 0.5s ease" }}
            />
            <text x="55" y="50" textAnchor="middle" fill={color} fontSize="22" fontFamily="monospace" fontWeight="300">
              {percent.toFixed(0)}
            </text>
            <text x="55" y="66" textAnchor="middle" fill="rgba(255,255,255,0.3)" fontSize="8" fontFamily="monospace">
              {label}
            </text>
          </svg>
        </div>
      );
    }

    // ── Sparkline ──
    function Sparkline({ data, width = 200, height = 40, color = GLOW_CYAN }) {
      if (!data || data.length < 2) return null;
      const max = Math.max(...data.map((d) => d.mu), 0.01);
      const min = Math.min(...data.map((d) => d.mu));
      const range = max - min || 0.01;
      const points = data
        .map((d, i) => {
          const x = (i / (data.length - 1)) * width;
          const y = height - ((d.mu - min) / range) * (height - 4) - 2;
          return `${x},${y}`;
        })
        .join(" ");

      return (
        <svg width={width} height={height} style={{ display: "block", opacity: 0.7 }}>
          <polyline fill="none" stroke={color} strokeWidth="1.2" points={points} />
          <circle
            cx={width}
            cy={height - ((data[data.length - 1].mu - min) / range) * (height - 4) - 2}
            r="2.5"
            fill={color}
          />
        </svg>
      );
    }

    // ── Phase Portrait (μ × ρ trajectory) ──
    function PhasePortrait({ data, width = 130, height = 90 }) {
      if (!data || data.length < 2) return null;
      const pts = data.slice(-90);
      const points = pts
        .map((d) => `${(d.fieldDensity * (width - 8) + 4).toFixed(1)},${(height - 4 - d.mu * (height - 8)).toFixed(1)}`)
        .join(" ");
      const head = pts[pts.length - 1];

      return (
        <svg width={width} height={height} style={{ display: "block" }}>
          <rect x="0.5" y="0.5" width={width - 1} height={height - 1} rx="4" fill="rgba(255,255,255,0.015)" stroke="rgba(74,240,208,0.08)" strokeWidth="0.5" />
          {[0.15, 0.35, 0.55, 0.75].map((m) => (
            <line key={m} x1="2" x2={width - 2} y1={height - 4 - m * (height - 8)} y2={height - 4 - m * (height - 8)}
              stroke="rgba(74,240,208,0.06)" strokeWidth="0.5" strokeDasharray="2,3" />
          ))}
          <polyline fill="none" stroke={GLOW_CYAN} strokeWidth="0.8" opacity="0.5" points={points} />
          <circle cx={head.fieldDensity * (width - 8) + 4} cy={height - 4 - head.mu * (height - 8)} r="2.5" fill={PULSE_GOLD} />
          <text x="4" y={height - 3} fill="rgba(255,255,255,0.15)" fontSize="6" fontFamily="monospace">ρ →</text>
          <text x="3" y="8" fill="rgba(255,255,255,0.15)" fontSize="6" fontFamily="monospace">μ ↑</text>
        </svg>
      );
    }

    // ── Status Badge ──
    function StatusBadge({ available }) {
      const sensors = [
        { key: "motion", label: "Accel" },

            <span style={{
              fontSize: 9, padding: "2px 6px", borderRadius: 4,

              key={s.key}

                fontSize: 9,

    // ── Field State Label ──
    function FieldStateLabel({ mu }) {
      const label = phaseName(mu);
      return (
        <div style={{ textAlign: "center", padding: "8px 0" }}>
          <div style={{
            fontSize: 14,
            letterSpacing: "0.3em",
            color: mu < 0.3 ? GLOW_DIM : mu < 0.7 ? GLOW_CYAN : PULSE_GOLD,
            fontFamily: "monospace",

            marginBottom: 4,
          }}>
            {label}
          </div>
          <div style={{ fontSize: 10, color: "rgba(255,255,255,0.2)", fontFamily: "sans-serif" }}>{PHASE_DESC[label]}</div>
        </div>
      );
    }

    // ── Constraint Flow Viz ──
    function ConstraintFlow({ mu, tension, fieldDensity }) {
      const upAlpha = clamp(fieldDensity * mu, 0, 0.8);
      const downAlpha = clamp(tension * mu, 0, 0.8);

      return (
        <svg width="100%" height="60" viewBox="0 0 300 60">
          <text x="20" y="15" fill="rgba(255,255,255,0.2)" fontSize="8" fontFamily="monospace">Physical</text>
          <text x="20" y="55" fill="rgba(255,255,255,0.2)" fontSize="8" fontFamily="monospace">Information</text>

          {[0, 1, 2, 3, 4].map((i) => {
            const x = 80 + i * 45;
            const phase = (Date.now() * 0.003 + i * 0.5) % 1;
            return (
              <g key={`up-${i}`}>
                <line x1={x} y1={20 - phase * 15} x2={x} y2={45 + phase * 5}
                  stroke={GLOW_CYAN} strokeWidth="1" opacity={upAlpha * (0.3 + phase * 0.5)} />
                <polygon points={`${x - 3},${25 - phase * 10} ${x + 3},${25 - phase * 10} ${x},${18 - phase * 10}`}
                  fill={GLOW_CYAN} opacity={upAlpha * 0.6} />
              </g>
            );
          })}

          {[0, 1, 2, 3, 4].map((i) => {
            const x = 100 + i * 45;
            const phase = (Date.now() * 0.002 + i * 0.7) % 1;
            return (
              <g key={`down-${i}`}>
                <line x1={x} y1={15 + phase * 5} x2={x} y2={40 + phase * 15}
                  stroke={PULSE_GOLD} strokeWidth="1" opacity={downAlpha * (0.3 + phase * 0.5)} />
                <polygon points={`${x - 3},${38 + phase * 10} ${x + 3},${38 + phase * 10} ${x},${45 + phase * 10}`}
                  fill={PULSE_GOLD} opacity={downAlpha * 0.6} />
              </g>
            );
          })}

          <rect x="70" y="22" width="220" height="16" rx="2" fill="none" stroke="rgba(74,240,208,0.08)" strokeWidth="0.5" strokeDasharray="3,3" />
          <text x="150" y="33" textAnchor="middle" fill={`rgba(74,240,208,${mu * 0.4})`} fontSize="7" fontFamily="monospace">
            Mediation Layer μ={mu.toFixed(2)}
          </text>
        </svg>
      );
    }

    // ── Metric Row ──
    function MetricRow({ label, value, unit, color = "rgba(255,255,255,0.5)" }) {
      return (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "4px 0", borderBottom: "1px solid rgba(255,255,255,0.03)" }}>
          <span style={{ color: "rgba(255,255,255,0.25)", fontSize: 11, fontFamily: "monospace" }}>{label}</span>
          <span style={{ color, fontSize: 13, fontFamily: "monospace", fontWeight: 300 }}>
            {typeof value === "number" ? value.toFixed(3) : value}
            {unit && <span style={{ fontSize: 9, opacity: 0.5, marginLeft: 3 }}>{unit}</span>}
          </span>
        </div>
      );
    }

    // ── Small ghost button ──
    function GhostButton({ onClick, children, active, warn, disabled }) {
      const color = disabled ? "rgba(255,255,255,0.12)" : warn ? WARN_RED : active ? PULSE_GOLD : GLOW_CYAN;
      return (
        <button
          onClick={disabled ? undefined : onClick}
          style={{
            background: active ? "rgba(212,168,67,0.08)" : "transparent",
            border: `1px solid ${disabled ? "rgba(255,255,255,0.06)" : warn ? "rgba(196,74,58,0.4)" : active ? "rgba(212,168,67,0.4)" : GLOW_DIM}`,
            color,
            padding: "8px 14px",
            borderRadius: 6,
            fontFamily: "monospace",
            fontSize: 10,
            letterSpacing: "0.15em",
            cursor: disabled ? "default" : "pointer",
            transition: "all 0.3s ease",
          }}
        >
          {children}
        </button>
      );
    }

    // ── Tab Navigation ──
    function TabNav({ active, onChange }) {
      const tabs = [
        { id: "field", label: "Field", icon: "◎" },
        { id: "state", label: "State", icon: "≡" },
        { id: "log", label: "Log", icon: "◍" },
      ];

      return (
        <div style={{ display: "flex", borderBottom: "1px solid rgba(74,240,208,0.08)", marginBottom: 12 }}>
          {tabs.map((tab) => (
            <button
              key={tab.id}
              onClick={() => onChange(tab.id)}
              style={{
                flex: 1,
                padding: "10px 0",
                background: "transparent",
                border: "none",
                borderBottom: active === tab.id ? `2px solid ${GLOW_CYAN}` : "2px solid transparent",
                color: active === tab.id ? GLOW_CYAN : "rgba(255,255,255,0.2)",
                fontSize: 11,
                fontFamily: "monospace",
                cursor: "pointer",
                transition: "all 0.3s ease",
                letterSpacing: "0.1em",
              }}
            >
              <span style={{ fontSize: 14, display: "block", marginBottom: 2 }}>{tab.icon}</span>
              {tab.label}
            </button>
          ))}
        </div>
      );
    }

    // ═══════════════════════════════════════
    // ███ MAIN APP ███
    // ═══════════════════════════════════════

    function VoidMediator() {
      const [started, setStarted] = useState(false);
      const [tab, setTab] = useState("field");
      const engine = useVoidEngine(started);
      const { ui, phaseRef, touchRef } = engine;

      const requestPermissions = useCallback(async () => {
        if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") {
          try {
            await DeviceMotionEvent.requestPermission();
            await DeviceOrientationEvent.requestPermission();
          } catch (e) { /* denied */ }
        }
        engine.enableMic(); // must run inside user gesture
        setStarted(true);
      }, [engine.enableMic]);

      // Splash / Permission screen
      if (!started) {
        return (
          <div style={{
            minHeight: "100vh",
            background: VOID_BLACK,
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
            padding: 24,
            fontFamily: "monospace",
          }}>
            <div style={{ textAlign: "center", maxWidth: 320 }}>
              <div style={{ marginBottom: 32 }}>
                <svg width="80" height="80" viewBox="0 0 80 80">
                  <circle cx="40" cy="40" r="35" fill="none" stroke={GLOW_DIM} strokeWidth="0.5" />
                  <circle cx="40" cy="40" r="25" fill="none" stroke={GLOW_CYAN} strokeWidth="0.8" opacity="0.5">
                    <animate attributeName="r" values="25;28;25" dur="3s" repeatCount="indefinite" />
                  </circle>
                  <circle cx="40" cy="40" r="3" fill={GLOW_CYAN} opacity="0.6">
                    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite" />
                  </circle>
                  <circle cx="40" cy="40" r="15" fill="none" stroke="rgba(74,240,208,0.15)" strokeWidth="0.5" strokeDasharray="2,4">
                    <animateTransform attributeName="transform" type="rotate" values="0 40 40;360 40 40" dur="20s" repeatCount="indefinite" />
                  </circle>
                </svg>
              </div>

              <div style={{ color: GLOW_CYAN, fontSize: 16, letterSpacing: "0.3em", marginBottom: 8, fontWeight: 300 }}>
                VOID MEDIATOR
              </div>
              <div style={{ color: "rgba(255,255,255,0.2)", fontSize: 10, letterSpacing: "0.2em", marginBottom: 32 }}>
                v0.2 — PHASE-LAW ARCHITECTURE
              </div>
              <div style={{ color: "rgba(255,255,255,0.12)", fontSize: 10, lineHeight: 1.8, marginBottom: 32 }}>
                Bridging the discontinuity<br />between information and physics

              <button
                onClick={requestPermissions}
                style={{
                  background: "transparent",
                  border: `1px solid ${GLOW_DIM}`,
                  color: GLOW_CYAN,

                  fontFamily: "monospace",
                  fontSize: 11,
                  letterSpacing: "0.2em",
                  cursor: "pointer",
                  transition: "all 0.3s ease",
                }}
              >
                ACTIVATE FIELD
              </button>

              <div style={{ color: "rgba(255,255,255,0.08)", fontSize: 8, marginTop: 16, lineHeight: 1.6 }}>
                Requires sensor access (accelerometer, orientation, audio)<br />
                No sensors? SIM mode engages — the pointer becomes the field
              </div>
            </div>
          </div>
        );
      }

      const phase = ui.phase;
      const uiOpacity = clamp(1.1 - phase.mu * 0.4, 0.3, 1);

      return (
        <div style={{
          minHeight: "100vh",
          background: VOID_BLACK,
          color: "rgba(255,255,255,0.6)",
          fontFamily: "monospace",
          padding: "12px 16px",
          maxWidth: 400,
          margin: "0 auto",
          transition: "opacity 0.5s ease",
          opacity: uiOpacity,
        }}>
          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 8 }}>
            <div style={{ whiteSpace: "nowrap" }}>
              <span style={{ color: GLOW_CYAN, fontSize: 13, letterSpacing: "0.2em", fontWeight: 300 }}>VOID MEDIATOR</span>
              <span style={{ color: "rgba(255,255,255,0.1)", fontSize: 9, marginLeft: 8 }}>v0.2</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              {ui.rec.on && (
                <span style={{ color: WARN_RED, fontSize: 10, fontFamily: "monospace" }}>● REC</span>
              )}

                onClick={engine.toggleSound}
                title="μ drone"
                style={{
                  background: "transparent",
                  border: `1px solid ${ui.soundOn ? "rgba(212,168,67,0.4)" : "rgba(255,255,255,0.08)"}`,
                  color: ui.soundOn ? PULSE_GOLD : "rgba(255,255,255,0.2)",

          </div>

              <div style={{ background: "rgba(255,255,255,0.02)", borderRadius: 8, padding: 12, marginBottom: 12 }}>

                <MetricRow label="Constraint Tension" value={phase.constraintTension} color={phase.constraintTension > 0.5 ? WARN_RED : GLOW_DIM} />

                <MetricRow label="accel.y" value={ui.sensors.accel.y} unit="m/s²" />
                <MetricRow label="accel.z" value={ui.sensors.accel.z} unit="m/s²" />
                <MetricRow label="gyro.β" value={ui.sensors.gyro.beta} unit="°" />
                <MetricRow label="gyro.γ" value={ui.sensors.gyro.gamma} unit="°" />
                <MetricRow label="audio" value={ui.sensors.audioLevel} />
                <MetricRow label="light" value={ui.sensors.light} unit={ui.available.light ? "lx~" : "sim"} />
              </div>

              <div style={{
                background: "rgba(74,240,208,0.02)",
                border: "1px solid rgba(74,240,208,0.06)",
                borderRadius: 6,
                padding: 10,
                textAlign: "center",
              }}>
                <div style={{ color: "rgba(255,255,255,0.15)", fontSize: 8, letterSpacing: "0.1em", marginBottom: 6 }}>
                  μ DYNAMICS
                </div>
                <div style={{ color: GLOW_DIM, fontSize: 11 }}>
                  dμ/dt = α(μ_env − μ) + β·∇ρ(x)
                </div>
                <div style={{ color: "rgba(255,255,255,0.1)", fontSize: 8, marginTop: 4 }}>α=0.08 β=0.04 + touch coupling</div>
              </div>
            </div>
          )}

          {/* Tab: Log */}
          {tab === "log" && (
            <div>
              {/* Recorder */}
              <div style={{ background: "rgba(255,255,255,0.02)", borderRadius: 8, padding: 12, marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
                  <span style={{ color: "rgba(255,255,255,0.2)", fontSize: 9, letterSpacing: "0.15em" }}>FIELD LOG — CSV RECORDER</span>
                  <span style={{ color: ui.rec.on ? WARN_RED : "rgba(255,255,255,0.2)", fontSize: 10 }}>
                    {ui.rec.on ? `● ${Math.floor(ui.rec.elapsed / 1000)}s` : "○ idle"}
                  </span>
                </div>
                <div style={{ color: "rgba(255,255,255,0.3)", fontSize: 11, marginBottom: 10 }}>
                  {ui.rec.rows} samples ({(ui.rec.rows * TICK_MS / 1000).toFixed(0)}s of field time)
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {!ui.rec.on
                    ? <GhostButton onClick={engine.rec.start}>▶ RECORD</GhostButton>
                    : <GhostButton onClick={engine.rec.stop} warn>■ STOP</GhostButton>}
                  <GhostButton onClick={engine.rec.download} disabled={ui.rec.rows === 0}>↓ CSV</GhostButton>
                  <GhostButton onClick={engine.rec.clear} disabled={ui.rec.rows === 0 || ui.rec.on}>✕ CLEAR</GhostButton>
                </div>
                <div style={{ color: "rgba(255,255,255,0.1)", fontSize: 8, marginTop: 8, lineHeight: 1.6 }}>
                  Compatible with field-analysis.html — drop the CSV there to analyze your walk.
                </div>
              </div>

              {/* Phase transitions */}
              <div style={{ background: "rgba(255,255,255,0.02)", borderRadius: 8, padding: 12, marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                  <span style={{ color: "rgba(255,255,255,0.2)", fontSize: 9, letterSpacing: "0.15em" }}>PHASE TRANSITIONS</span>
                  {ui.transitions.length > 0 && (
                    <button
                      onClick={engine.clearTransitions}
                      style={{ background: "transparent", border: "none", color: "rgba(255,255,255,0.15)", fontSize: 9, cursor: "pointer", fontFamily: "monospace" }}
                    >
                      clear
                    </button>
                  )}
                </div>
                {ui.transitions.length === 0 ? (
                  <div style={{ color: "rgba(255,255,255,0.12)", fontSize: 10, padding: "8px 0" }}>
                    No transitions yet — move, speak, or touch the field.
                  </div>
                ) : (
                  <div style={{ maxHeight: 220, overflowY: "auto" }}>
                    {ui.transitions.slice().reverse().slice(0, 40).map((tr, i) => (
                      <div key={`${tr.t}-${i}`} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: "1px solid rgba(255,255,255,0.03)", fontSize: 10 }}>
                        <span style={{ color: "rgba(255,255,255,0.2)" }}>{hms(tr.t)}</span>
                        <span>
                          <span style={{ color: GLOW_DIM }}>{tr.from}</span>
                          <span style={{ color: "rgba(255,255,255,0.2)", margin: "0 4px" }}>→</span>
                          <span style={{ color: tr.to === "DISSOLVED" ? PULSE_GOLD : GLOW_CYAN }}>{tr.to}</span>
                        </span>
                        <span style={{ color: "rgba(255,255,255,0.25)" }}>μ={tr.mu.toFixed(2)}</span>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{ color: "rgba(255,255,255,0.08)", fontSize: 8, marginTop: 8 }}>
                  Persisted locally. Haptic pulse on each transition (supported devices).
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Render ──
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<VoidMediator />);
  </script>
</body>
</html>
